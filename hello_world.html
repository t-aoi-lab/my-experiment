<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理学実験室</title>
    <style>
        /* Base styles */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5; /* Light gray background */
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            color: #333;
        }

        /* Container for central alignment */
        .container {
            text-align: center;
            padding: 2rem;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            max-width: 90%;
            width: 500px;
        }

        /* Large heading */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            font-weight: 700;
            color: #1a1a1a;
        }

        /* Primary blue button */
        .start-button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 123, 255, 0.2);
        }

        .start-button:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }

        .start-button:active {
            transform: translateY(0);
        }

        /* Custom Modal (Alternative to alert) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .close-btn {
            margin-top: 1.5rem;
            padding: 8px 20px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>心理学実験室へようこそ</h1>
        <button id="startBtn" class="start-button">実験を開始する</button>
    </div>

    <!-- Modal for custom alert message -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-content">
            <p id="modalMessage" style="font-size: 1.5rem; margin: 0;">Hello World!</p>
            <button id="closeBtn" class="close-btn">閉じる</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const startBtn = document.getElementById('startBtn');
            const modalOverlay = document.getElementById('modalOverlay');
            const closeBtn = document.getElementById('closeBtn');

            // Handle button click
            startBtn.addEventListener('click', () => {
                // Show custom modal instead of window.alert() for better UI
                modalOverlay.style.display = 'flex';
                console.log('Experiment started');
            });

            // Handle close modal
            closeBtn.addEventListener('click', () => {
                modalOverlay.style.display = 'none';
            });

            // Close modal when clicking outside content
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) {
                    modalOverlay.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
