<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jsPsych Experiment</title>
    <!-- jsPsych v7 CDN -->
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
        /* 仕様1: 背景色は灰色 */
        body, .jspsych-display-element {
            background-color: #808080;
            color: white;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
        }

        /* 仕様2: 直径100pxの赤い円 */
        .red-circle {
            width: 100px;
            height: 100px;
            background-color: #ff0000;
            border-radius: 50%;
            margin: 0 auto;
        }

        /* メッセージ用スタイル */
        .message {
            font-family: sans-serif;
            font-size: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <script>
        /**
         * jsPsychの初期化
         */
        const jsPsych = initJsPsych({
            on_finish: function() {
                // 実験終了時にデータを表示（デバッグ用）
                // jsPsych.data.displayData();
            }
        });

        // タイムラインの作成
        const timeline = [];

        /**
         * 仕様2 & 3: 赤い円を表示し、スペースキーを待機
         */
        const circle_trial = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: '<div class="red-circle"></div>',
            choices: [' '], // スペースキーのみ受け付ける
            prompt: '<p class="message" style="margin-top: 20px;">スペースキーを押して終了してください</p>'
        };
        timeline.push(circle_trial);

        /**
         * 仕様4: 終了メッセージを表示
         */
        const end_message = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: '<div class="message">実験が終了しました。<br>ご協力ありがとうございました。</div>',
            choices: "NO_KEYS", // キー入力を受け付けない（または一定時間で自動終了など）
            duration: 2000      // 2秒間表示して終了
        };
        timeline.push(end_message);

        // 実験の実行
        jsPsych.run(timeline);
    </script>
</body>
</html>
