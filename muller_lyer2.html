<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ミュラー・リヤー錯視 調整法実験</title>
  <!-- jsPsych CDN の読み込み (安定した jsDelivr を使用) -->
  <script src="https://cdn.jsdelivr.net/npm/jspsych@7.3.1/dist/index.browser.min.js"></script>
  <!-- canvas-slider-response プラグインと html-keyboard-response プラグインを正しく読み込み -->
  <script src="https://cdn.jsdelivr.net/npm/@jspsych/plugin-canvas-slider-response@1.1.2/dist/index.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@jspsych/plugin-html-keyboard-response@1.1.2/dist/index.browser.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jspsych@7.3.1/css/jspsych.css">
  
  <style>
    /* 画面全体を上下左右中央に配置するためのリセットとスタイル */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #f7f9fa;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      /* スクロールを許可して見切れを防止 */
      overflow: auto;
    }

    /* jsPsych のコンテンツコンテナを中央固定にする */
    .jspsych-content-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    .jspsych-content {
      max-width: 850px;
      width: 100%;
      max-height: 95vh; /* 画面からはみ出さないように制限 */
      overflow-y: auto; /* 縦幅が狭い端末ではコンテナ内スクロールを許可 */
      padding: 20px 30px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    /* ボタンデザイン of カスタマイズ */
    .jspsych-btn {
      padding: 10px 28px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 6px;
      background-color: #3b82f6;
      color: white;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      margin-top: 10px; /* 余白を縮小 */
      margin-bottom: 5px;
    }
    .jspsych-btn:hover {
      background-color: #2563eb;
    }
    .jspsych-btn:active {
      transform: scale(0.98);
    }
    
    /* セカンダリボタン（リトライ等） */
    .jspsych-btn-secondary {
      background-color: #10b981;
    }
    .jspsych-btn-secondary:hover {
      background-color: #059669;
    }

    /* スライダー下部に表示する試行数カウンターのスタイル */
    .trial-counter-bottom {
      font-size: 14px;
      font-weight: bold;
      color: #4b5563;
      margin-top: 10px;
      margin-bottom: 10px;
      background-color: #f3f4f6;
      padding: 4px 16px;
      border-radius: 20px;
      display: inline-block;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    /* 説明文章 of スタイル */
    .instructions {
      text-align: left;
      line-height: 1.8;
      color: #1f2937;
      font-size: 15px;
      margin-bottom: 25px;
    }
    .instructions h2 {
      text-align: center;
      color: #111827;
      margin-top: 0;
    }

    /* スライダーコンテナの調整 */
    .jspsych-canvas-slider-response-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Canvas要素のスタイル（視覚化のために枠線を追加） */
    canvas {
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      background-color: #fafafa;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
      display: block;
      margin: 0 auto;
    }

    /* スライダー自体の横幅を広げる */
    input[type=range] {
      width: 450px !important;
      max-width: 90% !important;
      margin: 15px 0 5px 0 !important; /* マージンを削減 */
    }

    /* 結果テーブルのスタイル */
    .result-table {
      border-collapse: collapse;
      width: 100%;
      margin: 20px 0;
      font-size: 16px;
    }
    .result-table th, .result-table td {
      border: 1px solid #e5e7eb;
      padding: 12px;
      text-align: center;
    }
    .result-table th {
      background-color: #f3f4f6;
      font-weight: bold;
    }

    /* 送信中ローディングのスタイル */
    .spinner {
      border: 4px solid rgba(0, 0, 0, 0.1);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border-left-color: #3b82f6;
      animation: spin 1s linear infinite;
      margin: 15px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="jspsych-target"></div>

  <script>
    // 【GAS接続の設定】デプロイしたWebアプリのURLをこちらに統合いたしました
    const GAS_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzW_qaCnZ_b5B4v7898O4dPSJM9UUKosew0efoSdpfUl2jartaoxvRB4I_h9CHncwe43Q/exec';

    // 外部CDNスクリプトのロード完了を完全に待ってから初期化を実行する
    window.addEventListener('load', function() {

      // CDNからロードされたプラグインを確実に検出してクラス（コンストラクタ）を返すヘルパー関数
      function getPluginClass(pluginVarName, infoName) {
        // 1. window 直下の直接的なグローバル変数のチェック
        if (window[pluginVarName]) {
          const p = window[pluginVarName];
          if (typeof p === 'object' && p.default) {
            return p.default;
          }
          return p;
        }

        // 2. jsPsych オブジェクト内のチェック
        if (window.jsPsych && window.jsPsych[pluginVarName]) {
          const p = window.jsPsych[pluginVarName];
          if (typeof p === 'object' && p.default) {
            return p.default;
          }
          return p;
        }

        // 3. window 直下に別名（小文字、ハイフン、ケバブケースなど）でマウントされている場合
        const possibleNames = [
          pluginVarName,
          pluginVarName.replace('jsPsych', 'jspsych'),
          pluginVarName.replace('jsPsych', ''),
          infoName,
          'jspsych-' + infoName
        ];

        for (let name of possibleNames) {
          if (window[name]) {
            const p = window[name];
            if (typeof p === 'object' && p.default) {
              return p.default;
            }
            if (typeof p === 'function') {
              return p;
            }
          }
        }

        // 4. info.name による全ウインドウプロパティの走査 (最も頑健なフォールバック)
        if (infoName) {
          for (let key in window) {
            try {
              const candidate = window[key];
              if (!candidate) continue;

              // 直接 info プロパティを持っている場合
              if (candidate.info && candidate.info.name === infoName) {
                return candidate;
              }
              // default プロパティ以下に持っている場合
              if (candidate.default && candidate.default.info && candidate.default.info.name === infoName) {
                return candidate.default;
              }
            } catch (e) {
              // iframeのクロスオリジン制約等によるエラーの抑制
            }
          }
        }

        console.error("Plugin not found for: " + pluginVarName + " (" + infoName + ")");
        return null;
      }

      // 各プラグインクラスを安全に解決
      const CanvasSliderResponsePlugin = getPluginClass('jsPsychCanvasSliderResponse', 'canvas-slider-response');
      const HtmlKeyboardResponsePlugin = getPluginClass('jsPsychHtmlKeyboardResponse', 'html-keyboard-response');

      // 読み込みエラー時の緊急用フォールバック
      if (typeof initJsPsych === 'undefined') {
        document.getElementById('jspsych-target').innerHTML = `
          <div style="padding: 20px; color: #dc2626; text-align: center;">
            <h3>エラー: jsPsychの初期化に失敗しました。</h3>
            <p>ネットワーク接続またはCDNサーバーの一時的な障害の可能性があります。ページを再読み込みしてください。</p>
          </div>
        `;
        return;
      }

      // jsPsychの初期化
      const jsPsych = initJsPsych({
        display_element: 'jspsych-target',
        on_finish: function() {
          // 実験終了時に結果を表示
          displayResults();
        }
      });

      // 定数とパラメータの設定
      const STIM_STANDARD_LENGTH = 200; // 標準刺激（上）の長さ（固定：200px）
      const TOTAL_TRIALS = 12;

      // 因子計画：角度 (15度, 75度) × 羽の長さ (20px, 50px)
      const factors = {
        angle: [15, 75],
        feather_length: [20, 50]
      };

      // フル階乗計画の生成 (4条件)
      const design = jsPsych.randomization.factorial(factors, 1);
      
      // 12試行にするために、4条件のリストを3回繰り返してランダムにシャッフルする
      let trial_conditions = [];
      for (let i = 0; i < 3; i++) {
        trial_conditions = trial_conditions.concat(JSON.parse(JSON.stringify(design)));
      }
      trial_conditions = jsPsych.randomization.shuffle(trial_conditions);

      // タイムラインの作成
      const timeline = [];

      // 0. 参加者情報入力画面 (学籍番号 / subject_id 入力)
      const student_id_trial = {
        type: HtmlKeyboardResponsePlugin,
        stimulus: `
          <div class="instructions" style="text-align: center;">
            <h2>実験参加者の情報登録</h2>
            <p style="margin-bottom: 20px;">実験を開始する前に、あなたの学籍番号を入力してください。</p>
            <div style="margin: 25px 0; display: flex; flex-direction: column; align-items: center; justify-content: center;">
              <label for="student-id" style="font-weight: bold; font-size: 16px; margin-bottom: 8px; color: #374151;">学籍番号（参加者ID）</label>
              <input type="text" id="student-id" style="padding: 12px 16px; font-size: 18px; border: 2px solid #d1d5db; border-radius: 8px; width: 280px; text-align: center; box-shadow: inset 0 1px 2px rgba(0,0,0,0.05); transition: border-color 0.2s;" placeholder="例: A26XX999" autofocus>
            </div>
            <p id="error-message" style="color: #dc2626; font-weight: bold; font-size: 14px; min-height: 20px; margin: 10px 0;"></p>
            <button class="jspsych-btn" id="submit-id-btn" style="margin-top: 10px;">次へ進む</button>
          </div>
        `,
        choices: "NO_KEYS", // キーボード操作での進行を一旦ブロック
        on_load: function() {
          const btn = document.getElementById('submit-id-btn');
          const input = document.getElementById('student-id');
          const errorMsg = document.getElementById('error-message');

          // テキストエリアにフォーカスを強制
          input.focus();

          // Enterキー入力時にも送信ボタンと同じクリックイベントをトリガー
          input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
              btn.click();
            }
          });

          // 入力時のボーダーカラーリセット
          input.addEventListener('input', function() {
            input.style.borderColor = '#d1d5db';
            errorMsg.textContent = '';
          });

          // 送信ボタンのクリックイベント
          btn.addEventListener('click', function() {
            const val = input.value.trim();
            if (val === '') {
              errorMsg.textContent = '学籍番号を入力してください。';
              input.style.borderColor = '#dc2626';
              input.focus();
            } else {
              // タイムスタンプの取得
              const timestamp = new Date().toISOString();
              // jsPsychのグローバルデータプロパティとして学籍番号を追加（全試行データに自動付与される）
              jsPsych.data.addProperties({ 
                student_id: val,
                subject_id: val,
                timestamp: timestamp
              });
              // 試行を終了させて次へ
              jsPsych.finishTrial({ entered_id: val });
            }
          });
        }
      };
      timeline.push(student_id_trial);

      // 1. 教示画面
      const instructions = {
        type: HtmlKeyboardResponsePlugin, // 解決したプラグインクラスを指定
        stimulus: `
          <div class="instructions">
            <h2>ミュラー・リヤー錯視 調整法実験</h2>
            <p>この実験では、線の長さの知覚について調べます。</p>
            <p>画面中央に、縦に並んだ2つの図形が表示されます。</p>
            <ul>
              <li><strong>上の図形：</strong> 長さが固定された基準の図形（内向きの羽）です。</li>
              <li><strong>下の図形：</strong> スライダーを動かすことで左右に伸縮する比較図形（外向きの羽）です。</li>
            </ul>
            <p><strong>【あなたのタスク】</strong><br>
            下の図形の主線の長さが, 上の図形の主線の長さと<strong>「視覚的にまったく同じ長さ」</strong>に見えるように、スライダーをドラッグして調整してください。<br>
            ちょうど良い長さに調整できたら、スライダーの下に表示される<strong>「決定」ボタン</strong>をクリックして次の試行に進んでください。</p>
            <p>実験は全部で <strong>12試行</strong> あります。</p>
            <p style="text-align: center; color: #ef4444; font-weight: bold; margin-top: 20px;">
              準備ができたら、スペースキーを押して実験を開始してください。
            </p>
          </div>
        `,
        choices: [' '],
        post_trial_gap: 1000
      };
      timeline.push(instructions);

      // ミュラー・リヤーの羽を描画する関数
      function drawMullerLyer(ctx, cx, cy, length, featherLength, angleDeg, inward) {
        const halfLen = length / 2;
        const startX = cx - halfLen;
        const endX = cx + halfLen;

        ctx.beginPath();

        // 主線（水平線）の描画
        ctx.moveTo(startX, cy);
        ctx.lineTo(endX, cy);

        // 角度をラジアンに変換
        const angleRad = (angleDeg * Math.PI) / 180;

        // 羽の向き（内向きか外向きか）
        const direction = inward ? 1 : -1;

        // 左端 of 羽 (startX, cy)
        ctx.moveTo(startX, cy);
        ctx.lineTo(startX + direction * featherLength * Math.cos(angleRad), cy - featherLength * Math.sin(angleRad));
        ctx.moveTo(startX, cy);
        ctx.lineTo(startX + direction * featherLength * Math.cos(angleRad), cy + featherLength * Math.sin(angleRad));

        // 右端 of 羽 (endX, cy)
        ctx.moveTo(endX, cy);
        ctx.lineTo(endX - direction * featherLength * Math.cos(angleRad), cy - featherLength * Math.sin(angleRad));
        ctx.moveTo(endX, cy);
        ctx.lineTo(endX - direction * featherLength * Math.cos(angleRad), cy + featherLength * Math.sin(angleRad));

        ctx.lineWidth = 3;
        ctx.strokeStyle = '#111827';
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();
      }

      // 2. 実験試行のループ作成
      trial_conditions.forEach((cond, index) => {
        // 試行ごとに、初期値を 100px 〜 300px の間でランダムに決定
        const randomStartValue = Math.floor(Math.random() * (300 - 100 + 1)) + 100;

        const trial = {
          type: CanvasSliderResponsePlugin, // 解決したプラグインクラスを指定
          stimulus: function(c, sliderValue) {
            const ctx = c.getContext('2d');

            // 描画バッファをクリア
            ctx.clearRect(0, 0, c.width, c.height);

            // キャンバス中央のX座標
            const cx = c.width / 2;

            // 上半分：標準刺激 (内向き羽、200px固定)
            const yStandard = c.height * 0.32; 
            drawMullerLyer(ctx, cx, yStandard, STIM_STANDARD_LENGTH, cond.feather_length, cond.angle, true);

            // 下半分：比較刺激 (外向き羽、初期状態の描画)
            const yComparison = c.height * 0.68; 
            
            // 初回読み込み時の sliderValue または randomStartValue で描画
            const currentComparisonLength = parseInt(sliderValue) || randomStartValue;
            drawMullerLyer(ctx, cx, yComparison, currentComparisonLength, cond.feather_length, cond.angle, false);
          },
          canvas_size: [400, 600], // [高さ, 幅] -> 解像度 600x400
          min: 50,
          max: 350,
          step: 1,
          slider_start: randomStartValue,
          slider_width: 450,
          button_label: '決定',
          prompt: '', // 画面上部の古い試行数カウンター（promptパラメータ）は削除済みです
          on_load: function() {
            const slider = document.getElementById('jspsych-canvas-slider-response-response') || document.querySelector('input[type="range"]');
            const canvas = document.getElementById('jspsych-canvas-slider-response-canvas') || document.querySelector('canvas');
            
            // 【確実なDOM構造での配置】
            // insertBeforeエラーを完全に防ぐため、確実にスライダー自体の直後にカウンターを安全に挿入します。
            if (slider && slider.parentElement) {
              const sliderParent = slider.parentElement;
              
              const bottomCounter = document.createElement('div');
              bottomCounter.className = 'trial-counter-bottom';
              bottomCounter.innerHTML = `現在の試行: ${index + 1} / ${TOTAL_TRIALS}`;
              
              // スライダー要素のすぐ後ろ（次の兄弟要素の前）に挿入することで、階層ズレを無くし、
              // The node before which the new node is to be inserted is not a child of this node エラーを完全に防ぎます。
              sliderParent.insertBefore(bottomCounter, slider.nextSibling);
            }
            
            // 【超重要】スライダー操作時に強制的にCanvasをリアルタイム再描画する機構
            if (slider && canvas) {
              const ctx = canvas.getContext('2d');
              
              const updateCanvas = function() {
                const currentVal = parseInt(slider.value) || randomStartValue;
                
                // キャンバスをクリア
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const cx = canvas.width / 2;

                // 上半分：標準刺激 (内向き羽、200px固定)を固定再描画
                const yStandard = canvas.height * 0.32; 
                drawMullerLyer(ctx, cx, yStandard, STIM_STANDARD_LENGTH, cond.feather_length, cond.angle, true);

                // 下半分：比較刺激 (外向き羽、動的に伸縮した値を反映)
                const yComparison = canvas.height * 0.68; 
                drawMullerLyer(ctx, cx, yComparison, currentVal, cond.feather_length, cond.angle, false);
              };

              // ドラッグ中の変更(input)とクリック離し時の変更(change)の両方をリッスンして同期描画
              slider.addEventListener('input', updateCanvas);
              slider.addEventListener('change', updateCanvas);
            }
          },
          data: {
            task: 'adjustment',
            angle: cond.angle,
            wing_length: cond.feather_length, // 指定データ構造に統合
            initial_value: randomStartValue,
            standard_length: STIM_STANDARD_LENGTH,
            trial_index: index + 1
          },
          on_finish: function(data) {
            // 最終調整値を記録 (PSE: 主観的等価点)
            data.pse = data.response;
            // 錯視量 (error_amount: 調整値 - 基準200px)
            data.error_amount = data.response - STIM_STANDARD_LENGTH;
          }
        };

        timeline.push(trial);
      });

      // データの集計と結果表示、およびGASへのデータ送信関数
      function displayResults() {
        const trials = jsPsych.data.get().filter({task: 'adjustment'}).values();
        
        // 保存されたデータから学籍番号とタイムスタンプを取得
        const firstTrial = jsPsych.data.get().values()[0];
        const studentId = firstTrial?.student_id || "未登録";
        const timestamp = firstTrial?.timestamp || new Date().toISOString();

        // 条件ごとに調整値を分類するオブジェクト
        const results = {};

        // 条件の初期化
        factors.angle.forEach(a => {
          factors.feather_length.forEach(f => {
            results[`${a}deg_${f}px`] = {
              angle: a,
              length: f,
              values: [],
              sum: 0
            };
          });
        });

        // データの割り振りと合計計算
        trials.forEach(t => {
          const key = `${t.angle}deg_${t.wing_length}px`;
          if (results[key]) {
            results[key].values.push(t.pse);
            results[key].sum += t.pse;
          }
        });

        // 平均値の計算とテーブル行のHTML生成
        let tableRows = '';
        Object.keys(results).forEach(key => {
          const cond = results[key];
          const avg = cond.values.length > 0 ? (cond.sum / cond.values.length).toFixed(1) : 0;
          const illusion = (avg - STIM_STANDARD_LENGTH).toFixed(1);
          const sign = illusion > 0 ? '+' : '';

          tableRows += `
            <tr>
              <td>外向き（下）</td>
              <td>${cond.angle} 度</td>
              <td>${cond.length} px</td>
              <td>200 px</td>
              <td style="font-weight: bold; color: #2563eb;">${avg} px</td>
              <td style="font-weight: bold; color: ${illusion > 0 ? '#dc2626' : '#16a34a'};">${sign}${illusion} px</td>
            </tr>
          `;
        });

        // GASへ送信するための構造化データの抽出
        const exportData = trials.map(t => {
          return {
            subject_id: studentId,
            timestamp: timestamp,
            angle: t.angle,
            wing_length: t.wing_length,
            pse: t.pse,
            error_amount: t.error_amount
          };
        });

        // 結果テーブル & GAS送信状態コンテナのHTML構築
        const finalResultsHTML = `
          <div class="instructions" style="width: 100%; text-align: center;">
            <h2>実験が完了しました！</h2>
            <div style="background-color: #f3f4f6; padding: 12px 24px; border-radius: 8px; display: inline-block; margin-bottom: 20px; border: 1px solid #e5e7eb;">
              <span style="font-size: 16px; font-weight: bold; color: #111827;">学籍番号:</span>
              <span style="font-size: 18px; font-weight: bold; color: #3b82f6; margin-left: 8px;">${studentId}</span>
            </div>
            
            <!-- データ保存用のステータス表示エリア (GAS連携) -->
            <div id="gas-status-container" style="margin-bottom: 25px; padding: 15px; border-radius: 8px; background-color: #f0fdf4; border: 1px solid #bbf7d0; max-width: 600px; margin-left: auto; margin-right: auto;">
              <p id="gas-status-message" style="margin: 0; font-weight: bold; color: #16a34a; font-size: 15px;">データを自動保存しています...</p>
              <div id="gas-spinner" class="spinner"></div>
              <button id="gas-retry-btn" class="jspsych-btn jspsych-btn-secondary" style="display: none; margin-top: 10px; padding: 8px 20px; font-size: 14px;">もう一度保存を試みる</button>
            </div>

            <p>ご協力ありがとうございました。測定された調整結果の平均値は以下の通りです。</p>
            <p style="font-size: 14px; color: #4b5563; margin-bottom: 20px;">※上の標準刺激（内向き羽）は 200 px 固定でした。外向き羽（下）は物理的に短めに調整されやすい傾向（錯視効果）があります。</p>
            
            <table class="result-table">
              <thead>
                <tr>
                  <th>羽の向き</th>
                  <th>角度</th>
                  <th>羽の長さ</th>
                  <th>基準（上）</th>
                  <th>あなたの調整平均（下）</th>
                  <th>錯視量</th>
                </tr>
              </thead>
              <tbody>
                ${tableRows}
              </tbody>
            </table>

            <button class="jspsych-btn" onclick="location.reload();">もう一度実験を行う</button>
          </div>
        `;

        // 画面書き換え
        document.getElementById('jspsych-target').innerHTML = finalResultsHTML;

        // 自動保存処理の実行
        sendToGAS(exportData);
      }

      // Google Apps Script へデータを送信する関数
      function sendToGAS(payloadData) {
        const container = document.getElementById('gas-status-container');
        const message = document.getElementById('gas-status-message');
        const spinner = document.getElementById('gas-spinner');
        const retryBtn = document.getElementById('gas-retry-btn');

        if (!GAS_WEBAPP_URL || GAS_WEBAPP_URL.includes('ここに手順3')) {
          // URLが未設定の場合
          container.style.backgroundColor = '#fffbeb';
          container.style.borderColor = '#fde68a';
          message.style.color = '#d97706';
          message.innerHTML = '⚠️ 【開発者向けメッセージ】<br>GAS WebApp URL が未設定のため自動保存がスキップされました。';
          spinner.style.display = 'none';
          return;
        }

        // 初期表示
        container.style.backgroundColor = '#f0fdf4';
        container.style.borderColor = '#bbf7d0';
        message.style.color = '#16a34a';
        message.textContent = 'データを自動保存しています...';
        spinner.style.display = 'block';
        retryBtn.style.display = 'none';

        // Fetchによる非同期POST送信
        fetch(GAS_WEBAPP_URL, {
          method: 'POST',
          mode: 'no-cors', // クロスオリジン対応 (GAS WebApp向け)
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payloadData)
        })
        .then(() => {
          // 'no-cors' モードの場合、正常終了しても不透明(opaque)なレスポンスが返るため
          // catchされなかった場合は送信完了とみなします。
          container.style.backgroundColor = '#f0fdf4';
          container.style.borderColor = '#bbf7d0';
          message.style.color = '#15803d';
          message.textContent = 'データの保存に成功しました。';
          spinner.style.display = 'none';
        })
        .catch((error) => {
          console.error('GAS Send Error:', error);
          container.style.backgroundColor = '#fef2f2';
          container.style.borderColor = '#fecaca';
          message.style.color = '#b91c1c';
          message.innerHTML = '❌ データの保存に失敗しました。<br><span style="font-size: 13px; font-weight: normal;">理由: ネットワークエラーまたはGASの応答がありません。</span>';
          spinner.style.display = 'none';
          
          // 再送信できるようにリトライボタンを活性化
          retryBtn.style.display = 'inline-block';
          retryBtn.onclick = function() {
            sendToGAS(payloadData);
          };
        });
      }

      // 実験の実行
      jsPsych.run(timeline);
    });
  </script>
</body>
</html>
