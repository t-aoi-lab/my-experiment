<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ストループ課題 (Stroop Task)</title>
  
  <!-- jsPsych 標準スタイルシートの読み込み (CDN) -->
  <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.0/css/jspsych.css">
  
  <style>
    /* 画面全体およびフォントのスタイル定義 */
    body, html {
      background-color: #FFFFFF !important; /* 背景色は白で固定 */
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      color: #333333;
    }
    
    /* jsPsych コンテンツエリアの基本フォントサイズを教示用の24pxに設定 */
    .jspsych-content {
      font-size: 24px !important;
      line-height: 1.6;
    }

    /* 刺激（ターゲット文字）用のスタイル。サイズは60px、中央揃え */
    .stroop-stimulus {
      font-size: 60px !important;
      font-weight: bold;
      text-align: center;
      user-select: none;
    }

    /* 注視点用のスタイル */
    .fixation-point {
      font-size: 60px !important;
      font-weight: normal;
      color: #333333;
    }

    /* 教示画面内のレイアウト用 */
    .instruction-container {
      text-align: left;
      max-width: 650px;
      margin: 0 auto;
      padding: 20px;
    }

    .key-guide {
      margin: 20px 0;
      padding-left: 20px;
      list-style-type: none;
    }

    .key-guide li {
      margin-bottom: 10px;
    }

    .highlight-box {
      background-color: #f5f5f5;
      padding: 15px;
      border-radius: 8px;
      border-left: 5px solid #333333;
    }
  </style>

  <!-- jsPsych 本体 -->
  <script src="https://unpkg.com/jspsych@7.3.0"></script>
  <!-- キーボード反応用プラグイン -->
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
  <!-- 全画面切り替え用プラグイン -->
  <script src="https://unpkg.com/@jspsych/plugin-fullscreen@1.2.1"></script>
  <!-- 参加者情報入力用プラグイン -->
  <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.2"></script>
</head>
<body>

  <script>
    // 送信先GASのURL定義（新しくデプロイされた最新のURLに差し替え済み）
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxMLUxf1Y7q7cZiGrho1Ee_IjXXwik-xMnGXJPe-gafYwXn0VZ1uV53dcVhKRj8EGkn/exec";

    // 指数バックオフを組み込んだデータ送信関数
    function sendDataWithBackoff(csvData, displayElement, retries = 5, delay = 1000) {
      // GAS側で e.parameter.csv と e.postData.contents のどちらが使われていても対応できるよう、
      // クエリパラメータとPOSTボディの両方にデータを載せてハイブリッド送信します。
      const urlWithParam = GAS_URL + "?csv=" + encodeURIComponent(csvData);

      fetch(urlWithParam, {
        method: "POST",
        mode: "no-cors", // CORSプレフライト(OPTIONS)およびリダイレクト時のブラウザによるブロックを完全に回避
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: csvData // ボディにも生のCSVデータを設定
      })
      .then(response => {
        // no-corsモードではレスポンスをブラウザが保護（opaque）しますが、
        // 通信処理自体が完了した時点で「送信成功」として画面を遷移させます。
        displayElement.innerHTML = `
          <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
            <h3 style="color: #2e7d32; font-size: 28px; margin-bottom: 20px;">データの送信が完了しました。</h3>
            <p style="font-size: 18px;">ご協力ありがとうございました。このブラウザを閉じても構いません。</p>
          </div>
        `;
      })
      .catch(error => {
        if (retries > 0) {
          displayElement.innerHTML = `
            <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
              <h3 style="font-size: 24px; margin-bottom: 20px;">データ送信中...</h3>
              <p style="font-size: 18px; color: #e65100;">通信エラーのため再試行しています (残り回数: ${retries}回)...</p>
            </div>
          `;
          setTimeout(() => {
            sendDataWithBackoff(csvData, displayElement, retries - 1, delay * 2);
          }, delay);
        } else {
          // すべての試行が失敗した場合のフォールバック表示
          displayElement.innerHTML = `
            <div style="text-align: center; margin-top: 50px; color: #cc0000; font-family: sans-serif; padding: 20px;">
              <h3 style="font-size: 28px; margin-bottom: 10px;">データの自動送信に失敗しました。</h3>
              <p style="font-size: 18px; color: #333333;">通信環境の良い場所で再度お試しいただくか、以下のデータをすべてコピーして実験実施者へ報告してください。</p>
              <textarea style="width: 80%; height: 250px; margin-top: 20px; font-family: monospace; font-size: 14px; padding: 10px;" readonly>${csvData}</textarea>
            </div>
          `;
        }
      });
    }

    // オブジェクトの配列をCSV文字列に変換するヘルパー関数
    function convertArrayToCSV(objArray) {
      if (objArray.length === 0) return "";
      
      const headers = Object.keys(objArray[0]);
      const csvRows = [];
      
      // ヘッダー行を追加
      csvRows.push(headers.join(","));
      
      // データ行を追加
      for (const row of objArray) {
        const values = headers.map(header => {
          const val = row[header] === null || row[header] === undefined ? "" : row[header];
          // 値にカンマやダブルクォーテーション、改行が含まれる場合のエスケープ処理
          const escaped = ('' + val).replace(/"/g, '""');
          return `"${escaped}"`;
        });
        csvRows.push(values.join(","));
      }
      
      return csvRows.join("\n");
    }

    // jsPsychの初期化
    const jsPsych = initJsPsych({
      on_finish: function() {
        // 全画面モードを安全に解除
        if (document.fullscreenElement) {
          document.exitFullscreen().catch(err => console.log(err));
        }

        // jsPsychが描画に利用しているDOM要素を安全に取得
        const displayElement = jsPsych.getDisplayElement();
        displayElement.innerHTML = `
          <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
            <h3 style="font-size: 24px; margin-bottom: 20px;">実験が終了しました。</h3>
            <p style="font-size: 18px;">データを整形して送信しています。しばらくお待ちください...</p>
          </div>
        `;

        // 本番試行(task: 'response')のみをフィルタリング
        const rawResponseData = jsPsych.data.get().filter({ task: 'response' });

        // 分析に必要な列のみを再構成したオブジェクトの配列を作成
        const cleanedDataArray = rawResponseData.values().map(function(trial) {
          return {
            subject_id: trial.subject_id,
            timestamp: trial.timestamp,
            word: trial.word,
            color: trial.color,
            condition: trial.condition,
            rt: trial.rt,
            // 空欄を回避し、確実に "true" / "false" 文字列を保持
            correct: trial.correct ? "true" : "false"
          };
        });

        // 独自の変換関数を用いて不要なデフォルト列が含まれないクリーンなCSVに変換
        const csvString = convertArrayToCSV(cleanedDataArray);

        // 指数バックオフを伴う自動送信を実行
        sendDataWithBackoff(csvString, displayElement);
      }
    });

    // タイムラインの作成
    const timeline = [];

    // (1) 参加者情報（ID）入力画面の追加
    const p_info_trial = {
      type: jsPsychSurveyText,
      questions: [
        { prompt: "参加者ID（例：学籍番号）を入力してください：", name: "ParticipantID", required: true }
      ],
      button_label: "次へ",
      on_finish: function(data) {
        // 入力されたIDを取得
        const id_input = data.response.ParticipantID;
        // 実験開始のタイムスタンプを生成 (YYYY-MM-DD HH:mm:ss)
        const now = new Date();
        const timestamp_str = now.getFullYear() + "-" + 
          String(now.getMonth() + 1).padStart(2, '0') + "-" + 
          String(now.getDate()).padStart(2, '0') + " " + 
          String(now.getHours()).padStart(2, '0') + ":" + 
          String(now.getMinutes()).padStart(2, '0') + ":" + 
          String(now.getSeconds()).padStart(2, '0');

        // 以降のすべての試行に「参加者ID」と「タイムスタンプ」を一元的に追加
        jsPsych.data.addProperties({
          subject_id: id_input,
          timestamp: timestamp_str
        });
      }
    };
    timeline.push(p_info_trial);

    // 全画面表示対応チェック
    const isFullscreenPermitted = document.fullscreenEnabled || 
                                  document.webkitFullscreenEnabled || 
                                  document.mozFullScreenEnabled || 
                                  document.msFullscreenEnabled;

    if (isFullscreenPermitted) {
      const fullscreen_trial = {
        type: jsPsychFullscreen,
        fullscreen_mode: true,
        message: `
          <div style="text-align: center;">
            <p>ストループ課題を開始します。</p>
          </div>
        `,
        button_label: '全画面表示にして開始する',
        delay_after: 500
      };
      timeline.push(fullscreen_trial);
    } else {
      const skip_fullscreen_trial = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `
          <div style="text-align: center; max-width: 600px; margin: 0 auto; line-height: 1.8;">
            <p>ストループ課題を開始します。</p>
            <p style="font-size: 18px; color: #666; margin-top: 20px;">
              ※現在の実行環境（プレビュー画面など）では全画面表示が制限されています。<br>
              このまま通常モードで実験を開始します。
            </p>
            <p style="margin-top: 30px; font-weight: bold;">スペースキーを押すと教示画面に進みます。</p>
          </div>
        `,
        choices: [' '],
        delay_after: 500
      };
      timeline.push(skip_fullscreen_trial);
    }

    // (2) 実験の教示画面
    const instructions = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div class="instruction-container">
          <p>これから、画面中央に色がついた漢字（赤、青、緑）が1文字ずつ表示されます。</p>
          <p>文字の意味ではなく、<strong>文字の「色」</strong>をできるだけ素早く、正確にキーボードで回答してください。</p>
          
          <div class="highlight-box">
            <ul class="key-guide">
              <li>🔴 文字の色が <span style="color: red; font-weight: bold;">赤色</span> のとき ： <strong>'r'</strong> キー</li>
              <li>🔵 文字の色が <span style="color: blue; font-weight: bold;">青色</span> のとき ： <strong>'b'</strong> キー</li>
              <li>🟢 文字の色が <span style="color: green; font-weight: bold;">緑色</span> のとき ： <strong>'g'</strong> キー</li>
            </ul>
          </div>
          
          <p style="text-align: center; margin-top: 30px; font-weight: bold;">
            スペースキーを押すと実験（全10試行）が始まります。
          </p>
        </div>
      `,
      choices: [' ']
    };
    timeline.push(instructions);

    // 要因計画: 「文字」と「色」の組み合わせの定義
    const stimuli_pool = [
      // 一致条件 (Congruent)
      { word: "赤", color: "red", condition: "congruent", correct_response: "r" },
      { word: "青", color: "blue", condition: "congruent", correct_response: "b" },
      { word: "緑", color: "green", condition: "congruent", correct_response: "g" },
      
      // 不一致条件 (Incongruent)
      { word: "赤", color: "blue", condition: "incongruent", correct_response: "b" },
      { word: "赤", color: "green", condition: "incongruent", correct_response: "g" },
      { word: "青", color: "red", condition: "incongruent", correct_response: "r" },
      { word: "青", color: "green", condition: "incongruent", correct_response: "g" },
      { word: "緑", color: "red", condition: "incongruent", correct_response: "r" },
      { word: "緑", color: "blue", condition: "incongruent", correct_response: "b" }
    ];

    // 重複を許容してランダムに10試行分を抽出
    const selected_trials = jsPsych.randomization.sampleWithReplacement(stimuli_pool, 10);

    // 3-(a) 注視点表示用の定義 (500ms)
    const fixation = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<div class="fixation-point">+</div>',
      choices: "NO_KEYS",
      trial_duration: 500,
      data: { task: 'fixation' }
    };

    // 3-(b) 刺激提示試行の定義
    const stroop_stimulus = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {
        const word = jsPsych.timelineVariable('word');
        const color = jsPsych.timelineVariable('color');
        return `<div class="stroop-stimulus" style="color: ${color};">${word}</div>`;
      },
      choices: ['r', 'b', 'g'],
      trial_duration: null,
      data: {
        task: 'response',
        word: jsPsych.timelineVariable('word'),
        color: jsPsych.timelineVariable('color'),
        condition: jsPsych.timelineVariable('condition'),
        correct_response: jsPsych.timelineVariable('correct_response')
      },
      on_finish: function(data) {
        const response_char = data.response;
        // 厳密な正誤判定をおこない、真偽値を格納
        data.correct = (response_char === data.correct_response);
      }
    };

    // 3-(c) 試行間隔 (ITI) 用の定義 (1000ms 空白画面)
    const rest = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '',
      choices: "NO_KEYS",
      trial_duration: 1000,
      data: { task: 'iti' }
    };

    // メイン試行ループの構成
    const main_procedure = {
      timeline: [fixation, stroop_stimulus, rest],
      timeline_variables: selected_trials
    };
    timeline.push(main_procedure);

    // 実験を開始
    window.onload = function() {
      jsPsych.run(timeline);
    };
  </script>
</body>
</html>
